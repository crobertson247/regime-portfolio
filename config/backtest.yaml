# =============================================================================
# Backtest / evaluation configuration (Phase 5)
# =============================================================================

backtest:
  assets: [SPY, TLT, LQD, GLD, DBC, BIL]
  rf_asset: "BIL"           # cash proxy used as the risk-free rate in the Sharpe ratio

  cost_bps: 10.0            # proportional transaction cost per unit traded
  cost_grid_bps: [0.0, 5.0, 10.0, 20.0]   # sensitivity sweep

  cscv_blocks: 16          # CSCV blocks for the probability of backtest overfitting

  stress_windows:
    "2008 GFC": ["2008-09-01", "2009-03-31"]
    "2020 COVID": ["2020-02-15", "2020-04-30"]
    "2022 tightening": ["2022-01-01", "2022-10-31"]
